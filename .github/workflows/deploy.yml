name: Deploy WPS Backend

on:
  push:
    branches:
      - production

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64]

    env:
      APP_DIR: /opt/wps_backend

    steps:
      - name: Validate App Directory
        run: |
          if [ ! -d "$APP_DIR" ]; then
            echo "Directory $APP_DIR not found!"
            exit 1
          fi

      - name: Pull Latest Code
        working-directory: ${{ env.APP_DIR }}
        run: |
          git fetch origin
          git reset --hard origin/production

      - name: Deploy Docker
        working-directory: ${{ env.APP_DIR }}
        run: |
          docker compose up -d --build --remove-orphans

      - name: Verify Container Running
        run: |
          docker ps | grep wps-backend

      - name: Cleanup Docker Images
        run: |
          docker image prune -af
