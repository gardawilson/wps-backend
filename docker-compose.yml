services:
  app:
    build: .
    container_name: wps-backend
    network_mode: host
    env_file: .env
    volumes:
      - ./storage:/app/storage
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

